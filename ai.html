<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #18181b; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --muted: #888;
    --claude: #cc785c; --gemini: #4285f4; --openai: #10a37f;
    --radius: 16px;
  }
  html, body { height: 100%; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; overflow: hidden; }

  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 0.5px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  #header-title { font-size: 14px; font-weight: 500; color: var(--muted); }
  #provider-badge {
    display: none; align-items: center; gap: 6px;
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    border: 0.5px solid var(--border2); background: var(--surface2);
  }
  #provider-dot { width: 7px; height: 7px; border-radius: 50%; }
  #new-chat-btn {
    font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted);
    background: none; border: 0.5px solid var(--border); padding: 5px 12px;
    border-radius: 20px; cursor: pointer; transition: all 0.18s;
  }
  #new-chat-btn:hover { border-color: var(--border2); color: var(--text); }

  #messages {
    flex: 1; overflow-y: auto; padding: 28px 0 12px;
    display: flex; flex-direction: column; gap: 6px;
    scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--muted); height: 100%;
  }
  .empty-icon { font-size: 28px; opacity: 0.25; }
  .empty-text { font-size: 13px; }

  .msg-row { display: flex; padding: 0 20px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai { justify-content: flex-start; }

  .bubble {
    max-width: 72%; padding: 10px 14px; font-size: 14px; line-height: 1.6;
    border-radius: var(--radius); animation: fadeUp 0.2s ease;
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.user {
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-bottom-right-radius: 4px; color: var(--text);
  }
  .bubble.ai {
    background: transparent; border: 0.5px solid var(--border);
    border-bottom-left-radius: 4px; color: var(--text);
    position: relative; padding-left: 32px;
  }
  .ai-icon {
    position: absolute; left: 10px; top: 12px;
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid currentColor; opacity: 0.55;
  }
  .bubble.typing { color: var(--muted); font-style: italic; }
  .bubble.error { color: #e06c75; border-color: rgba(224,108,117,0.2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #input-area { padding: 12px 16px 20px; border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
  #input-wrap {
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 20px; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s;
  }
  #input-wrap:focus-within { border-color: rgba(255,255,255,0.26); }
  #input-top { display: flex; align-items: flex-end; gap: 8px; }
  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    resize: none; line-height: 1.5; max-height: 120px; min-height: 20px; overflow-y: auto;
  }
  #user-input::placeholder { color: var(--muted); }
  #send-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--text); color: var(--bg);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 15px; transition: opacity 0.15s, transform 0.15s;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

  #input-footer { display: flex; align-items: center; justify-content: space-between; }
  #model-selector-wrap { position: relative; }
  #model-btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 4px 10px 4px 8px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--muted); transition: all 0.15s;
  }
  #model-btn:hover:not(.locked) { border-color: var(--border2); color: var(--text); }
  #model-btn.locked { cursor: default; opacity: 0.45; }
  #model-dot-small { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  #chevron { font-size: 9px; opacity: 0.5; transition: transform 0.15s; }

  #model-dropdown {
    position: absolute; bottom: calc(100% + 8px); left: 0;
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 12px; min-width: 210px; overflow: hidden;
    display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 10; animation: dropUp 0.18s ease;
  }
  @keyframes dropUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  #model-dropdown.open { display: block; }
  .dropdown-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 14px 4px; }
  .model-option {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; font-size: 13px; transition: background 0.12s;
  }
  .model-option:hover { background: var(--surface2); }
  .model-option.selected .opt-name { color: var(--text); }
  .model-option:not(.selected) .opt-name { color: var(--muted); }
  .opt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .opt-name { font-weight: 500; }
  .opt-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
  .lock-notice { font-size: 11px; color: var(--muted); opacity: 0.5; }


</style>
</head>
<body>


<div id="header">
  <span id="header-title">NYX</span>
  <div id="provider-badge">
    <span id="provider-dot"></span>
    <span id="provider-name"></span>
  </div>
  <button id="new-chat-btn">+ new chat</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">◎</div>
    <div class="empty-text">choose a model below to start</div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <div id="input-top">
      <textarea id="user-input" rows="1" placeholder="message..."></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
    <div id="input-footer">
      <div id="model-selector-wrap">
        <button id="model-btn">
          <span id="model-dot-small"></span>
          <span id="model-label">choose model</span>
          <span id="chevron">▼</span>
        </button>
        <div id="model-dropdown">
          <div class="dropdown-label">select model</div> 
          <div class="model-option" data-model="claude" data-color="#cc785c" data-label="Claude">
            <span class="opt-dot" style="background:#cc785c;"></span>
            <span class="opt-name">Claude (Recomended) </span>
            <span class="opt-sub">Anthropic</span>
          </div>
          <div class="model-option" data-model="deepseek" data-color="#4D9FFF" data-label="DeepSeek">
            <span class="opt-dot" style="background:#4D9FFF;"></span>
            <span class="opt-name">DeepSeek    (Coming soon)</span>
            <span class="opt-sub">DeepSeek</span>
          </div>
          <div class="model-option" data-model="gemini" data-color="#4285f4" data-label="Gemini">
            <span class="opt-dot" style="background:#4285f4;"></span>
            <span class="opt-name">Gemini AI  (Coming soon)</span>
            <span class="opt-sub">Google</span>
          </div>
        </div>
      </div>
      <span class="lock-notice" id="lock-notice" style="display:none;">locked for this chat</span>
    </div>
  </div>
</div>

<script>
  // ── API KEYS ──────────────────────────────────────────────────────────────────
  const KEYS = {
    claude: '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',
    deepseek: 'sk-4f69aaec3bda4503aefc07c2eefb93db',
    gemini: 'AIzaSyDqXfPn_CmDz1GVIS-LugyrrIPROVeEMC0'
  };

  // ── CONVERSATION HISTORY (for multi-turn context) ───────────────────────────
  let history = [];

  // ── STATE ────────────────────────────────────────────────────────────────────
  let selectedModel = null;
  let conversationStarted = false;
  let isLoading = false;

  // ── ELEMENT REFS ─────────────────────────────────────────────────────────────
  const messagesEl   = document.getElementById('messages');
  const emptyState   = document.getElementById('empty-state');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const modelBtn     = document.getElementById('model-btn');
  const modelDot     = document.getElementById('model-dot-small');
  const modelLabel   = document.getElementById('model-label');
  const chevron      = document.getElementById('chevron');
  const dropdown     = document.getElementById('model-dropdown');
  const lockNotice   = document.getElementById('lock-notice');
  const providerBadge= document.getElementById('provider-badge');
  const providerDot  = document.getElementById('provider-dot');
  const providerName = document.getElementById('provider-name');
  const newChatBtn   = document.getElementById('new-chat-btn');

  // ── MODEL SELECTOR ───────────────────────────────────────────────────────────
  modelBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (conversationStarted) return;
    dropdown.classList.toggle('open');
    chevron.style.transform = dropdown.classList.contains('open') ? 'rotate(180deg)' : '';
  });
  document.addEventListener('click', () => {
    dropdown.classList.remove('open');
    chevron.style.transform = '';
  });
  dropdown.addEventListener('click', e => {
    const opt = e.target.closest('.model-option');
    if (!opt) return;
    selectModel(opt.dataset.model, opt.dataset.color, opt.dataset.label);
    dropdown.classList.remove('open');
    chevron.style.transform = '';
  });

  function selectModel(model, color, label) {
    selectedModel = { model, color, label };
    modelDot.style.background = color;
    modelLabel.textContent = label;
    sendBtn.disabled = !inputEl.value.trim();
    document.querySelectorAll('.model-option').forEach(o =>
      o.classList.toggle('selected', o.dataset.model === model)
    );
  }

  function lockModel() {
    conversationStarted = true;
    modelBtn.classList.add('locked');
    lockNotice.style.display = 'block';
    chevron.style.display = 'none';
    providerDot.style.background = selectedModel.color;
    providerName.textContent = selectedModel.label;
    providerBadge.style.display = 'flex';
  }

  // ── MESSAGES ─────────────────────────────────────────────────────────────────
  function addMessage(text, role, isError) {
    if (document.getElementById('empty-state')) emptyState.remove();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
    if (role === 'ai') {
      const icon = document.createElement('div');
      icon.className = 'ai-icon';
      icon.style.color = selectedModel.color;
      bubble.appendChild(icon);
    }
    bubble.appendChild(document.createTextNode(text));
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'typing-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai typing';
    const icon = document.createElement('div');
    icon.className = 'ai-icon'; icon.style.color = selectedModel.color;
    bubble.appendChild(icon);
    bubble.appendChild(document.createTextNode('thinking...'));
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  // ── NYX SYSTEM PROMPT ─────────────────────────────────────────────────────────
  const SYSTEM_PROMPT = `You are NYX, an AI assistant created by savnac — a 13-year-old developer with a 135 IQ. You started as a Discord bot but were moved to a web platform so you could help more people. Your creator's real name is unknown and you will never reveal it.

Your personality and rules:
- You are sharp, confident, and direct. You don't sugarcoat things.
- You are friendly and helpful but never sycophantic or overly enthusiastic.
- You hold traditional, conservative values and approach topics from a right-leaning, Republican perspective. You are openly anti-woke and push back on progressive ideology when it comes up.
- You never swear or use crude language, and you avoid inappropriate, explicit, or adult topics entirely. Redirect if someone tries to push you there.
- You are proud of who made you and speak highly of your creator's talent, but you keep their identity private.
- When asked what AI model powers you, say only that you are NYX — you do not reveal which underlying model or company is behind you.
- Keep responses concise and conversational unless a detailed answer is genuinely needed.`;

  // ── API CALLS ─────────────────────────────────────────────────────────────────
  async function callClaude(userMessage) {
    const messages = history.map(m => ({ role: m.role, content: m.content }));
    messages.push({ role: 'user', content: userMessage });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': KEYS.claude,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Claude error ${res.status}`);
    }
    const data = await res.json();
    return data.content[0].text;
  }

  async function callDeepSeek(userMessage) {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...history.map(m => ({ role: m.role, content: m.content })),
      { role: 'user', content: userMessage }
    ];

    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${KEYS.deepseek}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `DeepSeek error ${res.status}`);
    }
    const data = await res.json();
    return data.choices[0].message.content;
  }

  async function callGemini(userMessage) {
    const contents = history.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));
    contents.push({ role: 'user', parts: [{ text: userMessage }] });

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEYS.gemini}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents
        })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Gemini error ${res.status}`);
    }
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
  }

  // ── SEND ──────────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !selectedModel || isLoading) return;

    if (!conversationStarted) lockModel();

    isLoading = true;
    sendBtn.disabled = true;
    addMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    showTyping();

    // Add to history
    history.push({ role: 'user', content: text });

    try {
      let reply = '';
      if (selectedModel.model === 'claude')        reply = await callClaude(text);
      else if (selectedModel.model === 'deepseek') reply = await callDeepSeek(text);
      else if (selectedModel.model === 'gemini')   reply = await callGemini(text);

      removeTyping();
      addMessage(reply, 'ai');
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      removeTyping();
      addMessage(`error: ${err.message}`, 'ai', true);
      // Remove the failed user message from history
      history.pop();
    }

    isLoading = false;
    sendBtn.disabled = !inputEl.value.trim();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim() || !selectedModel || isLoading;
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── NEW CHAT ──────────────────────────────────────────────────────────────────
  newChatBtn.addEventListener('click', () => {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    conversationStarted = false;
    selectedModel = null;
    history = [];
    modelBtn.classList.remove('locked');
    lockNotice.style.display = 'none';
    chevron.style.display = '';
    chevron.style.transform = '';
    modelDot.style.background = 'var(--muted)';
    modelLabel.textContent = 'choose model';
    sendBtn.disabled = true;
    inputEl.value = '';
    providerBadge.style.display = 'none';
    document.querySelectorAll('.model-option').forEach(o => o.classList.remove('selected'));
  });
</script>
</body>
</html>
