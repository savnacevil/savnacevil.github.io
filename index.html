<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVNAC</title>
<link rel="icon" type="image/jpg" href="favicon.jpg">
<link rel="apple-touch-icon" href="/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --cream: #e8e0cc;
    --amber: #c8963a;
    --rust: #a0401a;
    --muted: #4a4840;
    --line: rgba(232,224,204,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    color: var(--cream);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Horizontal rule lines */
  .rule {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: var(--line);
    z-index: 1;
  }
  .rule-1 { top: 15%; }
  .rule-2 { top: 85%; }

  .rule-v {
    position: fixed;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--line);
    z-index: 1;
  }
  .rule-v1 { left: 10%; }
  .rule-v2 { right: 10%; }

  /* Corner markers */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    border-color: var(--amber);
    border-style: solid;
    opacity: 0.5;
    z-index: 2;
  }
  .corner-tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

  /* Metadata strip */
  .meta {
    position: fixed;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    z-index: 2;
  }
  .meta-bl { bottom: 28px; left: 52px; }
  .meta-br { bottom: 28px; right: 52px; text-align: right; }
  .meta-tl { top: 28px; left: 52px; }
  .meta-tr { top: 28px; right: 52px; }

  /* Main layout */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Title block */
  .title-block {
    text-align: center;
    margin-bottom: 52px;
    position: relative;
  }

  .title-block::before {
    content: '◈';
    display: block;
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.3em;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 14vw, 140px);
    line-height: 0.9;
    letter-spacing: 0.08em;
    color: var(--cream);
    position: relative;
  }

  h1 span {
    display: inline-block;
    background: linear-gradient(160deg, #e8e0cc 30%, #c8963a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* Nav links */
  .nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 240px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1px solid rgba(232,224,204,0.08);
    background: rgba(232,224,204,0.02);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, color 0.3s;
    cursor: pointer;
  }

  .btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--amber);
    opacity: 0.12;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .btn:hover::before { width: 100%; }

  .btn:hover {
    border-color: var(--amber);
    color: #f0e8d0;
  }

  .btn-num {
    font-size: 9px;
    color: var(--muted);
    transition: color 0.3s;
  }

  .btn:hover .btn-num { color: var(--amber); }

  .btn-arrow {
    font-size: 10px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .btn:hover .btn-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Divider between buttons */
  .nav-sep {
    height: 1px;
    background: var(--line);
    margin: 4px 0;
  }

  /* Staggered animation for buttons */
  .btn:nth-child(1) { animation: slideIn 0.8s 0.3s both; }
  .btn:nth-child(3) { animation: slideIn 0.8s 0.45s both; }
  .btn:nth-child(5) { animation: slideIn 0.8s 0.6s both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Waveform decoration */
  .wave-bar {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 24px;
    margin: 28px auto 0;
    justify-content: center;
  }
  .wave-bar span {
    display: block;
    width: 2px;
    background: var(--amber);
    opacity: 0.4;
    border-radius: 1px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .wave-bar span:nth-child(1)  { height: 6px;  animation-delay: 0s; }
  .wave-bar span:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
  .wave-bar span:nth-child(3)  { height: 20px; animation-delay: 0.2s; }
  .wave-bar span:nth-child(4)  { height: 10px; animation-delay: 0.3s; }
  .wave-bar span:nth-child(5)  { height: 18px; animation-delay: 0.4s; }
  .wave-bar span:nth-child(6)  { height: 24px; animation-delay: 0.5s; }
  .wave-bar span:nth-child(7)  { height: 14px; animation-delay: 0.4s; }
  .wave-bar span:nth-child(8)  { height: 8px;  animation-delay: 0.3s; }
  .wave-bar span:nth-child(9)  { height: 16px; animation-delay: 0.2s; }
  .wave-bar span:nth-child(10) { height: 6px;  animation-delay: 0.1s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scaleY(1); }
    50% { opacity: 0.55; transform: scaleY(1.15); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Grid lines -->
<div class="rule rule-1"></div>
<div class="rule rule-2"></div>
<div class="rule-v rule-v1"></div>
<div class="rule-v rule-v2"></div>

<!-- Corner markers -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Metadata labels -->
<div class="meta meta-tl">savnac.io</div>
<div class="meta meta-tr">v2.0</div>
<div class="meta meta-bl">41°44′N 111°50′W</div>
<div class="meta meta-br" id="clock">——</div>

<!-- Main content -->
<div class="stage">
  <div class="title-block">
    <h1><span>SAVNAC</span></h1>
    <div class="subtitle">music · ai · community</div>
  </div>

  <nav class="nav">
    <a href="/music.html" class="btn">
      <span class="btn-num">01</span>
      <span>Music</span>
      <span class="btn-arrow">→</span>
    </a>
    <div class="nav-sep"></div>
    <a href="/ai.html" class="btn">
      <span class="btn-num">02</span>
      <span>AI</span>
      <span class="btn-arrow">→</span>
    </a>
    <div class="nav-sep"></div>
    <a href="/chat.html" class="btn">
      <span class="btn-num">03</span>
      <span>Chat</span>
      <span class="btn-arrow">→</span>
    </a>
  </nav>

  <div class="wave-bar">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<script>
  // Clock
  function tick() {
    const now = new Date();
    const t = now.toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('clock').textContent = t;
  }
  tick();
  setInterval(tick, 1000);

  // Canvas: slow drifting rings / orbital particles
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, particles;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  class Orb {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.r = Math.random() * 1.4 + 0.3;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.life = 0;
      this.maxLife = 200 + Math.random() * 400;
      if (init) this.life = Math.random() * this.maxLife;
      // amber or cream
      this.amber = Math.random() < 0.2;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life++;
      if (this.life > this.maxLife) this.reset(false);
      if (this.x < 0 || this.x > W) this.vx *= -1;
      if (this.y < 0 || this.y > H) this.vy *= -1;
    }
    draw() {
      const t = this.life / this.maxLife;
      const alpha = t < 0.1 ? t / 0.1 : t > 0.9 ? (1 - t) / 0.1 : 1;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.amber
        ? `rgba(200, 150, 58, ${alpha * 0.7})`
        : `rgba(232, 224, 204, ${alpha * 0.35})`;
      ctx.fill();
    }
  }

  // Large ambient glow circles
  class GlowRing {
    constructor() { this.reset(); }
    reset() {
      this.x = W * (0.2 + Math.random() * 0.6);
      this.y = H * (0.2 + Math.random() * 0.6);
      this.radius = 80 + Math.random() * 200;
      this.phase = Math.random() * Math.PI * 2;
      this.speed = 0.003 + Math.random() * 0.004;
    }
    draw(t) {
      const alpha = 0.03 + 0.015 * Math.sin(t * this.speed + this.phase);
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
      grad.addColorStop(0, `rgba(200, 150, 58, ${alpha * 1.5})`);
      grad.addColorStop(1, 'rgba(200, 150, 58, 0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  resize();
  const orbs = Array.from({ length: 90 }, () => new Orb());
  const glows = Array.from({ length: 3 }, () => new GlowRing());
  let frame = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;
    glows.forEach(g => g.draw(frame));
    orbs.forEach(o => { o.update(); o.draw(); });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => {
    resize();
    glows.forEach(g => g.reset());
  });

  draw();
</script>
</body>
</html>
